<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO y Metadatos -->
  <meta name="description" content="El Taller Distribuidora - Catálogo oficial mayorista y minorista. Envíos y la mejor calidad.">
  <meta name="author" content="El Taller Distribuidora">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="El Taller Distribuidora">
  <meta property="og:image" content="https://eltallerdistribuidora.com/eltaller.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="eltaller.png">
  <title>Termos - El Taller</title>
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="supabase-config.js"></script>
  <script src="security.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

  <div id="site-navbar"></div>
  <script src="motion.js"></script>
  <script src="navbar.js"></script>

  <main class="max-w-7xl mx-auto px-6 pt-6 pb-24 md:pt-8 md:pb-8 flex-grow w-full">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-200 pb-4 mb-8 gap-4">
      <div>
        <h1 class="text-2xl font-black text-gray-900 uppercase tracking-tight" id="titulo-categoria">Termos</h1>
        <p class="text-xs text-gray-500 mt-1" id="contador-productos">Cargando productos...</p>
      </div>
      <select id="ordenar-precio" onchange="ordenarProductos()" class="bg-white border border-gray-300 rounded-lg px-3 py-2 text-xs font-semibold text-gray-700 outline-none focus:border-black cursor-pointer">
        <option value="recientes">Más recientes</option>
        <option value="menor-precio">Precio: Menor a Mayor</option>
        <option value="mayor-precio">Precio: Mayor a Menor</option>
      </select>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" id="grilla-productos"></div>
  </main>

  <div id="modal-carrito" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-end hidden">
    <div class="bg-white w-full max-w-md h-full flex flex-col justify-between p-6 shadow-xl overflow-y-auto">
      <div>
        <div class="flex justify-between items-center border-b pb-4 mb-4">
          <h2 class="text-xl font-bold text-gray-800">Tu Carrito</h2>
          <button onclick="toggleCarrito()" class="text-gray-500 text-xl font-bold">&times;</button>
        </div>
        <div id="items-carrito" class="space-y-4 max-h-[40vh] overflow-y-auto pr-2"></div>
      </div>
      <div class="border-t pt-4 mt-4">
        <div class="my-4 p-3 bg-gray-50 border rounded-xl">
          <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500">Cupón de descuento</label>
          <div class="flex gap-2 mt-1.5">
            <input id="input-cupon" type="text" placeholder="Código" class="flex-1 border rounded-lg px-3 py-2 text-xs outline-none focus:border-taller">
            <button onclick="validarYAplicarCupon()" class="bg-taller text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-taller-dark transition">Aplicar</button>
          </div>
          <p id="msg-cupon" class="text-[11px] mt-1.5 hidden"></p>
        </div>
        <div class="space-y-1 text-sm mb-4">
          <div class="flex justify-between text-gray-600"><span>Subtotal</span><span id="cart-subtotal">$0</span></div>
          <div class="flex justify-between text-gray-600"><span>Descuento</span><span id="cart-descuento">-$0</span></div>
          <div class="flex justify-between font-bold text-gray-900 text-base pt-2 border-t"><span>Total</span><span id="cart-total">$0</span></div>
        </div>
        <button onclick="irAlCheckout()" class="w-full bg-taller hover:bg-taller-dark text-white font-bold py-3 rounded-xl transition">Finalizar compra</button>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="footer.js"></script>

  <script>
    window.CATEGORIA_ACTUAL = 'Termos';
    window.PAGINA_CATEGORIA = {
      slug: 'termos',
      nombre: 'Termos',
      titulo: 'Termos',
      filtro: 'categoria'
    };
  </script>
  <script src="categoria.js"></script>
</body>
</html>
